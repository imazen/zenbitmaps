[package]
name = "zenbitmaps"
version = "0.1.0"
edition = "2024"
rust-version = "1.93"
license = "MIT OR Apache-2.0"
description = "PNM/PAM/PFM, BMP, and farbfeld image format decoder and encoder"
categories = ["multimedia::images"]
keywords = ["image", "pnm", "bmp", "farbfeld", "pam"]
repository = "https://github.com/imazen/zenbitmaps"
documentation = "https://docs.rs/zenbitmaps"
readme = "README.md"
exclude = ["tests/bmp-fixtures/", "CLAUDE.md", "FEEDBACK.md", "justfile", "api-feedback.md"]

[dependencies]
# Core (always available)
enough = "0.4.2"
imgref = { version = "1.12", default-features = false, optional = true }
rgb = { version = "0.8", default-features = false, features = ["as-bytes"], optional = true }
thiserror = { version = "2.0", default-features = false }
zencodec = { version = "0.1.1", optional = true }
zennode = { path = "../zennode/zennode", default-features = false, features = ["derive"], optional = true }
zenpixels = { version = "0.2.0", default-features = false, features = ["imgref"], optional = true }

[dev-dependencies]
archmage = { version = "0.9.12", features = ["std"] }

[target.'cfg(not(target_arch = "wasm32"))'.dev-dependencies]
codec-corpus = "1"

[features]
default = []
std = []

# Format groups
bmp = []   # Full BMP support (all bit depths, RLE, bitfields, palettes)

# Typed pixel support
rgb = ["dep:rgb"]              # RGB8, RGBA8 etc. typed pixel encode/decode
imgref = ["dep:imgref", "rgb"] # ImgVec/ImgRef 2D buffer support (implies rgb)

# zencodec trait integration
zencodec = ["dep:zencodec", "dep:zenpixels", "imgref", "rgb"]

# zennode node definitions (EncodeBmp schema with RIAPI keys)
zennode = ["dep:zennode"]

# All optional features
all = ["bmp", "rgb", "imgref"]
